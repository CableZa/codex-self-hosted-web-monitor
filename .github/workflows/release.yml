name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
