name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run security audit
        shell: bash
        run: |
          set -o pipefail
          ./scripts/security-audit | tee security-audit.md

      - name: Generate SBOM
        run: python3 scripts/generate-sbom.py > sbom.cdx.json

      - name: Extract release notes
        run: python3 scripts/extract-release-notes.py "${GITHUB_REF_NAME}" > release-notes.md

      - name: Add release evidence summary
        run: |
          {
            echo
            echo "### Release Evidence"
            echo
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Security audit: attached as security-audit.md"
            echo "- SBOM: attached as sbom.cdx.json"
          } >> release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          body_path: release-notes.md
          files: |
            security-audit.md
            sbom.cdx.json
